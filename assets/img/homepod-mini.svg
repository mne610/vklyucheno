    <linearGradient id="mesh" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#626a74"/><stop offset=".5" stop-color="#474e57"/><stop offset="1" stop-color="#363c44"/></linearGradient>
    <radialGradient id="top" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="#ff9a6a" stop-opacity=".95"/><stop offset=".55" stop-color="#d9694a" stop-opacity=".7"/><stop offset="1" stop-color="#7b6cff" stop-opacity=".4"/></radialGradient>
