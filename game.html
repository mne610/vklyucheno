function draw(){
 g.clearRect(0,0,W,H);g.fillStyle=PAPER;g.fillRect(0,0,W,H);
 g.strokeStyle='rgba(20,19,15,.035)';g.lineWidth=1;for(var y=0;y<H;y+=4){g.beginPath();g.moveTo(0,y+.5);g.lineTo(W,y+.5);g.stroke();}
 g.save();g.translate(-cam*0.4,0);g.strokeStyle='rgba(20,19,15,.1)';g.lineWidth=2;
 for(var a=0;a<10;a++){var ax=120+a*380;g.beginPath();g.moveTo(ax,H);g.lineTo(ax,180);g.arc(ax+70,180,70,Math.PI,0);g.lineTo(ax+140,H);g.stroke();}g.restore();
 g.save();g.translate(-cam,0);
 plats.forEach(function(p){if(p.gone||p.x+p.w<cam-40||p.x>cam+W+40)return;var sh=(p.ct!=null&&p.ct<0.4)?(Math.random()*2-1):0;
  g.save();g.translate(sh,0);g.fillStyle=INK;g.fillRect(p.x,p.y,p.w,p.h);g.fillStyle=GRAY;g.fillRect(p.x,p.y,p.w,3);
  g.strokeStyle='rgba(242,238,226,.14)';g.lineWidth=1;for(var bx=p.x+18;bx<p.x+p.w;bx+=34){g.beginPath();g.moveTo(bx,p.y+4);g.lineTo(bx,p.y+p.h);g.stroke();}
  for(var by=p.y+16;by<p.y+p.h;by+=16){g.beginPath();g.moveTo(p.x,by);g.lineTo(p.x+p.w,by);g.stroke();}
  if(p.loose){g.strokeStyle='rgba(242,238,226,.5)';g.setLineDash([4,4]);g.lineWidth=1.5;g.strokeRect(p.x+1,p.y+1,p.w-2,p.h-2);g.setLineDash([]);}g.restore();});
 torch(430,384);torch(770,214);torch(1520,266);torch(2200,262);torch(2800,260);torch(3180,360);
 g.fillStyle=INK;spikes.forEach(function(sp){for(var tx=sp.x;tx<sp.x+sp.w;tx+=16){g.beginPath();g.moveTo(tx,510);g.lineTo(tx+8,486);g.lineTo(tx+16,510);g.closePath();g.fill();}});
 g.strokeStyle=INK;g.lineWidth=4;g.beginPath();g.moveTo(door.x,door.y);g.lineTo(door.x,door.y-70);g.arc(door.x+26,door.y-70,26,Math.PI,0);g.lineTo(door.x+52,door.y);g.stroke();
 gadgets.forEach(function(gd,k){if(gd.got)return;var bob=Math.sin(Date.now()/300+k)*4;g.save();g.translate(gd.x,gd.y+bob);g.strokeStyle='rgba(20,19,15,.22)';g.setLineDash([2,4]);g.lineWidth=1;g.beginPath();g.arc(0,0,20,0,7);g.stroke();g.setLineDash([]);drawGadget(gd.t);g.restore();});
 guards.forEach(function(gu){if(gu.dead)return;figure(gu.x,gu.y,gu.face,poseRun(gu.ph),true,false);});
 if(!(inv>0&&Math.floor(Date.now()/70)%2))figure(P.x+P.w/2,P.y+P.h,P.face,playerPose(),false,P.atkT>0);
 g.restore();hud();if(state!=='play')overlay();
}
function hud(){g.fillStyle='rgba(242,238,226,.92)';g.fillRect(0,0,W,34);g.strokeStyle=INK;g.lineWidth=1;g.beginPath();g.moveTo(0,34.5);g.lineTo(W,34.5);g.stroke();
 g.fillStyle=INK;g.textBaseline='middle';g.font='700 15px "Playfair Display",serif';g.textAlign='left';g.fillText('ВКЛЮЧЕНО · ОХОТА ЗА ГАДЖЕТАМИ',14,18);
 g.textAlign='center';g.font='900 16px "Playfair Display",serif';g.fillText('собрано '+got+' / 10',W/2,18);
 var mm=Math.floor(tLeft/60),ss=Math.floor(tLeft%60);g.textAlign='right';g.fillStyle=tLeft<20?'#a3241d':INK;g.fillText('время '+mm+':'+(ss<10?'0':'')+ss,W-14,18);
 if(tickerT>0){g.textAlign='center';g.fillStyle=INK;g.font='italic 700 15px "Playfair Display",serif';g.fillText('собрано: '+ticker,W/2,52);}}
function overlay(){g.fillStyle='rgba(20,19,15,.72)';g.fillRect(0,0,W,H);g.fillStyle=PAPER;g.textAlign='center';
 if(state==='title'){g.font='900 46px "Playfair Display",serif';g.fillText('ОХОТА ЗА ГАДЖЕТАМИ',W/2,H/2-78);
  g.font='700 20px "Noto Serif JP",serif';g.fillText('林檎狩り · ВКЛЮЧЕНО',W/2,H/2-40);
  g.font='400 16px Georgia,serif';g.fillText('Собери 10 гаджетов. Цепляйся за уступы, рубись со стражей,',W/2,H/2-6);g.fillText('не стой на осыпающихся плитах, успей до конца выпуска.',W/2,H/2+16);
  g.font='700 14px "Playfair Display",serif';g.fillText('← → бег · ↑/пробел прыжок и подтягивание · F меч',W/2,H/2+52);
  g.font='900 18px "Playfair Display",serif';g.fillText('▶ КЛИКНИ ИЛИ НАЖМИ КЛАВИШУ',W/2,H/2+90);}
 else if(state==='win'){g.font='900 44px "Playfair Display",serif';g.fillText('ЭКСТРЕННЫЙ ВЫПУСК!',W/2,H/2-40);g.font='400 20px Georgia,serif';g.fillText('Все 10 гаджетов собраны. Печатаем номер.',W/2,H/2);g.font='700 16px "Playfair Display",serif';g.fillText('осталось: '+Math.floor(tLeft)+' с · нажми, чтобы снова',W/2,H/2+40);}
 else{g.font='900 44px "Playfair Display",serif';g.fillText('ВЫПУСК СОРВАН',W/2,H/2-40);g.font='400 20px Georgia,serif';g.fillText('Собрано '+got+' из 10. Время вышло.',W/2,H/2);g.font='700 16px "Playfair Display",serif';g.fillText('нажми клавишу или тапни — снова',W/2,H/2+40);}}
var last=0;function loop(ts){var dt=Math.min(0.05,(ts-last)/1000||0);last=ts;if(state==='play')update(dt);draw();requestAnimationFrame(loop);}requestAnimationFrame(loop);
})();
</script>
